name: scout-jobs

on:
  schedule:
    - cron: "0 6 * * *"      # every day at 06:00 UTC
  workflow_dispatch: {}        # adds a manual "Run workflow" button
  push:
    branches: [main]
    paths-ignore:
      - "jobs.json"            # don't re-trigger on the bot's own commit

permissions:
  contents: write              # lets the job commit jobs.json back

jobs:
  scout:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install deps
        run: pip install -r requirements.txt

      - name: Scout jobs
        run: python app/fetch_jobs.py

      - name: Commit results
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add jobs.json
          git diff --quiet --staged || git commit -m "Update jobs $(date -u +%F)"
          git push
