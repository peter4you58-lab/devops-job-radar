name: scout-jobs

on:
  schedule:
    - cron: "0 6 * * *"      # every day at 06:00 UTC
  workflow_dispatch: {}        # manual "Run workflow" button
  push:
    branches: [main]
    paths-ignore:
      - "jobs.json"            # don't re-trigger on the bot's own commit

permissions:
  contents: write

# Only one run at a time, queued (never cancelled) — stops runs racing
# each other when they all try to commit jobs.json back to the repo.
concurrency:
  group: scout-jobs-commit
  cancel-in-progress: false

jobs:
  scout:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install deps
        run: pip install -r requirements.txt

      - name: Scout jobs
        run: python app/fetch_jobs.py

      - name: Commit results
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if git diff --quiet -- jobs.json; then
            echo "No changes to jobs.json — nothing to commit."
            exit 0
          fi
          git add jobs.json
          git commit -m "Update jobs $(date -u +'%Y-%m-%d %H:%M')"
          # pull anything that landed on main since checkout, then push
          git pull --rebase --autostash origin main
          git push
