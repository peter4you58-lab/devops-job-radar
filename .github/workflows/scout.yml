name: scout-jobs

on:
  schedule:
    - cron: "0 6 * * *"      # daily 06:00 UTC (~07:00 WAT)
  workflow_dispatch: {}       # manual: Actions tab -> Run workflow

# never let two runs race on the same jobs.json commit
concurrency:
  group: scout-jobs
  cancel-in-progress: false

permissions:
  contents: write             # least privilege: only needs to push jobs.json

jobs:
  scout:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install deps
        run: pip install --quiet requests feedparser

      - name: Run scout
        run: python scout-jobs.py

      - name: Commit jobs.json if changed
        run: |
          git config user.name  "job-radar-bot"
          git config user.email "actions@github.com"
          if git diff --quiet -- jobs.json; then
            echo "No change in jobs.json — nothing to commit."
          else
            git add jobs.json
            git commit -m "radar: refresh jobs.json ($(date -u +%Y-%m-%dT%H:%MZ))"
            git push
          fi
